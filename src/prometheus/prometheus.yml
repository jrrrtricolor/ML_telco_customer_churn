global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alerts.yml"

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
  - job_name: 'ml_telco_customer_churn'
    static_configs:
      - targets: ['ml_telco_customer_churn:8000']
    metrics_path: '/metrics'

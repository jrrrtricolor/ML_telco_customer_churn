name: Gerar relatorio de commit

runs:
  using: composite
  steps:
    - name: Instalar dependencias
      shell: bash
      run: |
        python -m pip install --upgrade pip
        python -m pip install -e ".[dev]"

    - name: Gerar relatorio automatico
      shell: bash
      run: python src/utils/gerar_relatorio_commit.py

    - name: Publicar relatorio na pasta report
      shell: bash
      run: |
        if git diff --quiet -- report/; then
          echo "Sem alteracao no relatorio."
          exit 0
        fi
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add report/
        git commit -m "atualiza relatorio automatico [skip ci]"
        git push

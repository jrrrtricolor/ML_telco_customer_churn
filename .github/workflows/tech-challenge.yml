name: Tech Challenge

on:
  push:
    branches:
      - develop
      - main
      - master
  pull_request:
    branches:
      - develop
      - main
      - master
  workflow_dispatch:

concurrency:
  group: tech-challenge-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint and tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            requirement.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Lint
        run: make lint PYTHON=python

      - name: Unit and smoke tests
        run: make test-unit PYTHON=python

  docker-smoke:
    name: Docker build and smoke test
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: quality

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t churn-api:ci .

      - name: Run API container
        run: |
          docker run -d --name churn-api-ci -p 8000:8000 churn-api:ci

      - name: Wait for API health
        run: |
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:8000/health; then
              exit 0
            fi
            docker logs churn-api-ci --tail 20 || true
            sleep 2
          done
          docker logs churn-api-ci --tail 200 || true
          exit 1

      - name: Check metrics endpoint
        run: |
          curl -fsS http://127.0.0.1:8000/metrics | head -20

      - name: Show container logs
        if: always()
        run: docker logs churn-api-ci --tail 200 || true

      - name: Stop container
        if: always()
        run: docker rm -f churn-api-ci || true
